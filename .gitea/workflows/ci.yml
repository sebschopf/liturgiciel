name: CI — LiturgiCielauri

on:
  push:
    branches: [main, 'feat/**', 'fix/**', 'docs/**']
  pull_request:
    branches: [main]

jobs:
  # ─── Qualité du code Rust ───────────────────────────────────────────────────
  lint-rust:
    name: Rust — Formatage & Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Vérification du formatage Rust
        run: cargo fmt --check
        working-directory: src-tauri
      - name: Clippy (zéro warning autorisé)
        run: cargo clippy -- -D warnings
        working-directory: src-tauri
      - name: Audit de sécurité des dépendances
        run: cargo audit
        working-directory: src-tauri

  # ─── Tests Rust ─────────────────────────────────────────────────────────────
  test-rust:
    name: Rust — Tests Unitaires
    runs-on: ubuntu-latest
    needs: lint-rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Tests cargo
        run: cargo test
        working-directory: src-tauri

  # ─── Qualité du code Frontend ───────────────────────────────────────────────
  lint-frontend:
    name: Frontend — Formatage & Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Vérification TypeScript + Svelte
        run: npm run check
      - name: ESLint
        run: npm run lint
      - name: Prettier (vérification)
        run: npm run format:check

  # ─── Tests Frontend ─────────────────────────────────────────────────────────
  test-frontend:
    name: Frontend — Tests Vitest
    runs-on: ubuntu-latest
    needs: lint-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Tests Vitest
        run: npm run test

  # ─── Qualité de la Documentation ────────────────────────────────────────────
  lint-docs:
    name: Documentation — Markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Lint Markdown
        run: npm run lint:md

  # ─── Vérification du message de commit ──────────────────────────────────────
  check-commit:
    name: Commit — Référence ADR obligatoire
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Vérifier les messages de commit de la PR
        run: |
          git log origin/main..HEAD --format="%s %b" | while read msg; do
            echo "$msg" | npx commitlint || exit 1
          done
